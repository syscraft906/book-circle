name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/syscraft906/book-circle

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      short-sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Update image tag in k8s manifest
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          sed -i "s|image: ghcr.io/syscraft906/book-circle:.*|image: ghcr.io/syscraft906/book-circle:${SHA}|" k8s/deployment.yaml
          git config user.email "ci@syscraft906.dev"
          git config user.name "GitHub Actions [CI]"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: deploy ${SHA}" && git push
