apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-circle
  namespace: book-circle
  labels:
    app: book-circle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-circle
  template:
    metadata:
      labels:
        app: book-circle
      annotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: book-circle
          image: nginxdemos/hello:latest    # placeholder — CI will replace with ghcr.io/syscraft906/book-circle:<sha>
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: book-circle-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
